[app]
description = "Checks for completed downloads and extracts them so {{|App|}}Radarr{{[-]}}, {{|App|}}Lidarr{{[-]}}, {{|App|}}Sonarr{{[-]}}, and {{|App|}}Readarr{{[-]}} may import them"
helptext = "{{|App|}}Unpackerr{{[-]}} runs as a daemon on your download host. It checks for completed downloads and extracts them so {{|App|}}Radarr{{[-]}}, {{|App|}}Lidarr{{[-]}}, {{|App|}}Sonarr{{[-]}}, and {{|App|}}Readarr{{[-]}} may import them. There are a handful of options out there for extracting and deleting files after your client downloads them. I just didn't care for any of them, so I wrote my own. I wanted a small single-binary with reasonable logging that can extract downloaded archives and clean up the mess after they've been imported."

["unpackerr<__instance>:UN_INTERVAL"]
helpline = "How often to check for completed downloads (e.g. 2m, 5m, 1h)."

["unpackerr<__instance>:UN_SONARR_0_URL"]
helpline = "URL of the Sonarr instance (e.g. http://sonarr:8989)."

["unpackerr<__instance>:UN_SONARR_0_API_KEY"]
helpline = "Sonarr API key from Settings → General."

["unpackerr<__instance>:UN_RADARR_0_URL"]
helpline = "URL of the Radarr instance (e.g. http://radarr:7878)."

["unpackerr<__instance>:UN_RADARR_0_API_KEY"]
helpline = "Radarr API key from Settings → General."

["unpackerr<__instance>:UN_LIDARR_0_URL"]
helpline = "URL of the Lidarr instance (e.g. http://lidarr:8686)."

["unpackerr<__instance>:UN_LIDARR_0_API_KEY"]
helpline = "Lidarr API key from Settings → General."

["unpackerr<__instance>:UN_FOLDER_0_PATH"]
helpline = "Path to watch for completed archives to extract."

["unpackerr<__instance>:UN_FOLDER_0_DELETE_ORIGINAL"]
helpline = "Delete the original archive after successful extraction."

[["unpackerr<__instance>:UN_FOLDER_0_DELETE_ORIGINAL".options]]
value = "'false'"
label = "Keep archive"

[["unpackerr<__instance>:UN_FOLDER_0_DELETE_ORIGINAL".options]]
value = "'true'"
label = "Delete archive"

["unpackerr<__instance>:UN_FOLDER_0_MOVE_BACK"]
helpline = "Move extracted files back into the original folder."

[["unpackerr<__instance>:UN_FOLDER_0_MOVE_BACK".options]]
value = "'true'"
label = "Enabled"

[["unpackerr<__instance>:UN_FOLDER_0_MOVE_BACK".options]]
value = "'false'"
label = "Disabled"

["unpackerr<__instance>:UN_FOLDER_0_DELETE_AFTER"]
helpline = "Delete extracted files after this duration (e.g. 10m, 1h). Set to 0 to disable."
