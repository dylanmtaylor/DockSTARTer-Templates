["ouroboros<__instance>:CLEANUP"]
helpline = "Remove old images after updating containers."

[["ouroboros<__instance>:CLEANUP".options]]
value = "'true'"
label = "Enabled"
help = "Recommended to avoid accumulating unused images."

[["ouroboros<__instance>:CLEANUP".options]]
value = "'false'"
label = "Disabled"

["ouroboros<__instance>:SELF_UPDATE"]
helpline = "Allow Ouroboros to update itself."

[["ouroboros<__instance>:SELF_UPDATE".options]]
value = "'true'"
label = "Enabled"

[["ouroboros<__instance>:SELF_UPDATE".options]]
value = "'false'"
label = "Disabled"

["ouroboros<__instance>:LOG_LEVEL"]
helpline = "Logging verbosity level."

[["ouroboros<__instance>:LOG_LEVEL".options]]
value = "'info'"
label = "Info"
help = "Standard logging (recommended)."

[["ouroboros<__instance>:LOG_LEVEL".options]]
value = "'debug'"
label = "Debug"

[["ouroboros<__instance>:LOG_LEVEL".options]]
value = "'warn'"
label = "Warn"

[["ouroboros<__instance>:LOG_LEVEL".options]]
value = "'error'"
label = "Error"

["ouroboros<__instance>:CRON"]
helpline = "Cron expression for update checks (e.g. '0 4 * * *' = daily at 4am)."

["ouroboros<__instance>:INTERVAL"]
helpline = "Polling interval in seconds (used instead of CRON if set)."

["ouroboros<__instance>:MONITOR"]
helpline = "Comma-separated list of container names to monitor. Leave blank to monitor all."

["ouroboros<__instance>:IGNORE"]
helpline = "Comma-separated list of container names to exclude from updates."

["ouroboros<__instance>:NOTIFIERS"]
helpline = "Shoutrrr-format notification URLs (space-separated)."
