[app]
description = "A dead simple static HOMepage for your servER"
helptext = "{{|App|}}Homer{{[-]}} is a dead simple static HOMepage for your servER to keep your services on hand, from a simple yaml configuration file."
website = "https://github.com/bastienwirtz/homer"

["homer<__instance>:INIT_ASSETS"]
helpline = "Copy default example assets into the config volume on first run."

[["homer<__instance>:INIT_ASSETS".options]]
value = "'1'"
label = "Enabled"
help = "Populate config with examples if empty (recommended for first run)."

[["homer<__instance>:INIT_ASSETS".options]]
value = "'0'"
label = "Disabled"

["homer<__instance>:SUBFOLDER"]
helpline = "Base URL subfolder if running behind a reverse proxy (e.g. /homer)."
