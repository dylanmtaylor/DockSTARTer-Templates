[app]
description = "A media server for your comics, mangas, BDs and magazines"
helptext = "{{|App|}}Komga{{[-]}} is a media server for your comics, mangas, BDs and magazines."
website = "https://komga.org"

["komga<__instance>:KOMGA_LIBRARIES_SCAN_CRON"]
helpline = "Cron expression for automatic library scans (e.g. '0 0 */8 * * ?' = every 8 hours)."

["komga<__instance>:SERVER_SERVLET_CONTEXT_PATH"]
helpline = "Base URL path for Komga (e.g. /komga for a subfolder install). Leave blank for root."
