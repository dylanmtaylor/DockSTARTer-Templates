["apcupsd<__instance>:HOST"]
helpline = "Hostname or IP of the apcupsd daemon to connect to."

["apcupsd<__instance>:INTERVAL"]
helpline = "Polling interval in seconds between UPS status checks."

["apcupsd<__instance>:VERBOSE"]
helpline = "Enable verbose logging."

[["apcupsd<__instance>:VERBOSE".options]]
value = "'false'"
label = "Disabled"

[["apcupsd<__instance>:VERBOSE".options]]
value = "'true'"
label = "Enabled"

["apcupsd<__instance>:INFUXDB_HOST"]
helpline = "InfluxDB hostname (e.g. influxdb)."

["apcupsd<__instance>:INFUXDB_DATABASE"]
helpline = "InfluxDB database name for storing UPS metrics."

["apcupsd<__instance>:INFUXDB_PORT"]
helpline = "InfluxDB port (default 8086)."

["apcupsd<__instance>:INFUXDB_USER"]
helpline = "InfluxDB username."

["apcupsd<__instance>:INFUXDB_PASSWORD"]
helpline = "InfluxDB password."
