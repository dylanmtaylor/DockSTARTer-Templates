[app]
description = "Have you ever spent longer deciding on a movie than it'd take to juwatch a random movie? This is an app that helps you and your frienpick a movie to watch from a {{|App|}}Plex{{[-]}} server."
helptext = "Have you ever spent longer deciding on a movie than it'd take to just watch a random movie? This is an app that helps you and your friends pick a movie to watch from a {{|App|}}Plex{{[-]}} server."

["moviematch<__instance>:PLEX_URL"]
helpline = "URL of your Plex server (e.g. http://plex:32400)."

["moviematch<__instance>:PLEX_TOKEN"]
helpline = "Plex authentication token. Find it in a Plex XML request URL as X-Plex-Token."

["moviematch<__instance>:LOG_LEVEL"]
helpline = "Logging verbosity level."

[["moviematch<__instance>:LOG_LEVEL".options]]
value = "'INFO'"
label = "Info"
help = "Standard logging (recommended)."

[["moviematch<__instance>:LOG_LEVEL".options]]
value = "'DEBUG'"
label = "Debug"
help = "Verbose output for troubleshooting."

[["moviematch<__instance>:LOG_LEVEL".options]]
value = "'WARN'"
label = "Warn"

[["moviematch<__instance>:LOG_LEVEL".options]]
value = "'ERROR'"
label = "Error"
