[app]
description = "Home server for your comics and ebooks"
helptext = "{{|App|}}Ubooquity{{[-]}} is a free, lightweight and easy-to-use home server for your comics and ebooks. Use it to access your files from anywhere, with a tablet, an e-reader, a phone or a computer."
website = "https://vaemendis.net/ubooquity/"

["ubooquity<__instance>:MAXMEM"]
helpline = "Maximum JVM heap size in MB for Ubooquity."

[["ubooquity<__instance>:MAXMEM".options]]
value = "'512'"
label = "512 MB"
help = "Default — suitable for small libraries."

[["ubooquity<__instance>:MAXMEM".options]]
value = "'1024'"
label = "1 GB"

[["ubooquity<__instance>:MAXMEM".options]]
value = "'2048'"
label = "2 GB"
help = "Recommended for large libraries."
