[app]
description = "A personal finance manager"
helptext = "{{|App|}}Firefly III{{[-]}} is a personal finances manager."
website = "https://github.com/firefly-iii/firefly-iii"

["fireflyiii<__instance>:APP_KEY"]
helpline = "32-character random string used for encryption. Generate with: head -c 32 /dev/urandom | base64 | head -c 32"

["fireflyiii<__instance>:DB_CONNECTION"]
helpline = "Database driver to use."

[["fireflyiii<__instance>:DB_CONNECTION".options]]
value = "'mysql'"
label = "MySQL / MariaDB"

[["fireflyiii<__instance>:DB_CONNECTION".options]]
value = "'sqlite'"
label = "SQLite"

[["fireflyiii<__instance>:DB_CONNECTION".options]]
value = "'pgsql'"
label = "PostgreSQL"

["fireflyiii<__instance>:DB_HOST"]
helpline = "Database hostname (e.g. mariadb)."

["fireflyiii<__instance>:DB_DATABASE"]
helpline = "Database name."

["fireflyiii<__instance>:DB_USERNAME"]
helpline = "Database username."

["fireflyiii<__instance>:DB_PASSWORD"]
helpline = "Database password."

["fireflyiii<__instance>:DB_PORT"]
helpline = "Database port (3306 for MySQL, 5432 for PostgreSQL)."

["fireflyiii<__instance>:TRUSTED_PROXIES"]
helpline = "IP or CIDR of trusted reverse proxy. Use ** to trust all proxies."

[["fireflyiii<__instance>:TRUSTED_PROXIES".options]]
value = "'**'"
label = "Trust all"
help = "Trust any reverse proxy. Use only in a private network."
