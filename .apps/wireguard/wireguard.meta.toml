[app]
description = "{{|App|}}WireGuard{{[-]}} is an extremely simple yet fast and modern VPN that utilizes state-of-the-art cryptography."
helptext = "{{|App|}}WireGuard{{[-]}} is an extremely simple yet fast and modern VPN that utilizes state-of-the-art cryptography. It aims to be faster, simpler, leaner, and more useful than IPsec, while avoiding the massive headache. It intends to be considerably more performant than OpenVPN. {{|App|}}WireGuard{{[-]}} is designed as a general purpose VPN for running on embedded interfaces and super computers alike, fit for many different circumstances. Initially released for the Linux kernel, it is now cross-platform (Windows, macOS, BSD, iOS, Android) and widely deployable. It is currently under heavy development, but already it might be regarded as the most secure, easiest to use, and simplest VPN solution in the industry."
website = "https://www.wireguard.com/"

["wireguard<__instance>:ALLOWEDIPS"]
helpline = "IP ranges peers will route through the VPN."

[["wireguard<__instance>:ALLOWEDIPS".options]]
value = "'0.0.0.0/0'"
label = "All traffic"
help = "Route all internet traffic through the VPN."

[["wireguard<__instance>:ALLOWEDIPS".options]]
value = "'10.13.13.0/24'"
label = "VPN subnet only"
help = "Only route traffic between peers — split tunnel."

["wireguard<__instance>:INTERNAL_SUBNET"]
helpline = "Internal subnet for WireGuard peers (e.g. 10.13.13.0)."

["wireguard<__instance>:PEERDNS"]
helpline = "DNS server assigned to peers."

[["wireguard<__instance>:PEERDNS".options]]
value = "'auto'"
label = "Auto"
help = "Use the server's DNS (recommended)."

[["wireguard<__instance>:PEERDNS".options]]
value = "'1.1.1.1'"
label = "Cloudflare"

[["wireguard<__instance>:PEERDNS".options]]
value = "'8.8.8.8'"
label = "Google"

[["wireguard<__instance>:PEERDNS".options]]
value = "'9.9.9.9'"
label = "Quad9"

["wireguard<__instance>:PEERS"]
helpline = "Number of peer configs to generate, or a comma-separated list of peer names."

["wireguard<__instance>:SERVERURL"]
helpline = "Public hostname or IP address peers will connect to. Use 'auto' to detect."

[["wireguard<__instance>:SERVERURL".options]]
value = "'auto'"
label = "Auto-detect"
help = "Automatically detect the server's public IP."
