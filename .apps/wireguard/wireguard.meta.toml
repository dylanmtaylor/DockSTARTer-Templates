["wireguard:ALLOWEDIPS"]
helpline = "IP ranges peers will route through the VPN."

[["wireguard:ALLOWEDIPS".options]]
value = "'0.0.0.0/0'"
label = "All traffic"
help = "Route all internet traffic through the VPN."

[["wireguard:ALLOWEDIPS".options]]
value = "'10.13.13.0/24'"
label = "VPN subnet only"
help = "Only route traffic between peers — split tunnel."

["wireguard:INTERNAL_SUBNET"]
helpline = "Internal subnet for WireGuard peers (e.g. 10.13.13.0)."

["wireguard:PEERDNS"]
helpline = "DNS server assigned to peers."

[["wireguard:PEERDNS".options]]
value = "'auto'"
label = "Auto"
help = "Use the server's DNS (recommended)."

[["wireguard:PEERDNS".options]]
value = "'1.1.1.1'"
label = "Cloudflare"

[["wireguard:PEERDNS".options]]
value = "'8.8.8.8'"
label = "Google"

[["wireguard:PEERDNS".options]]
value = "'9.9.9.9'"
label = "Quad9"

["wireguard:PEERS"]
helpline = "Number of peer configs to generate, or a comma-separated list of peer names."

["wireguard:SERVERURL"]
helpline = "Public hostname or IP address peers will connect to. Use 'auto' to detect."

[["wireguard:SERVERURL".options]]
value = "'auto'"
label = "Auto-detect"
help = "Automatically detect the server's public IP."
