[app]
description = "(DEPRECATED) Use {{|App|}}AirsonicAdvanced{{[-]}}"
helptext = "{{|App|}}Airsonic{{[-]}} is a free, web-based media streamer, providing ubiquitous access to your music. Use it to share your music with friends, or to listen to your own music while at work. You can stream to multiple players simultaneously, for instance to one player in your kitchen and another in your living room."
website = "https://github.com/airsonic/airsonic"

["airsonic<__instance>:CONTEXT_PATH"]
helpline = "URL base path for Airsonic (e.g. /airsonic for a subfolder install)."

["airsonic<__instance>:JAVA_OPTS"]
helpline = "Additional Java options (e.g. -Xmx512m to set max heap size)."
