["synclounge<__instance>:AUTOJOIN_ENABLE"]
helpline = "Automatically join a room on startup."

[["synclounge<__instance>:AUTOJOIN_ENABLE".options]]
value = "'false'"
label = "Disabled"

[["synclounge<__instance>:AUTOJOIN_ENABLE".options]]
value = "'true'"
label = "Enabled"

["synclounge<__instance>:AUTOJOIN_ROOM"]
helpline = "Room name to auto-join on startup (requires AUTOJOIN_ENABLE=true)."

["synclounge<__instance>:AUTOJOIN_PASSWORD"]
helpline = "Password for the auto-join room."

["synclounge<__instance>:AUTH_LIST"]
helpline = "Comma-separated list of Plex usernames allowed to connect. Leave blank to allow all."

["synclounge<__instance>:EXTERNAL_URL"]
helpline = "Public URL of this SyncLounge instance (used in invite links)."

["synclounge<__instance>:EXTERNAL_SERVER_PORT"]
helpline = "External port the server is accessible on."
