[app]
description = "(DEPRECATED) Use {{|App|}}Vaultwarden{{[-]}}"
helptext = "{{|App|}}Bitwarden{{[-]}} is a free and open-source password management service that stores sensitive information such as website credentials in an encrypted vault. {{|App|}}Vaultwarden{{[-]}} is an alternative implementation of the {{|App|}}Bitwarden{{[-]}} server API written in Rust and compatible with upstream upstream {{|App|}}Bitwarden{{[-]}} clients, perfect for self-hosted deployment where running the official resource-heavy service might not be ideal. DockSTARTer uses the {{|App|}}Vaultwarden{{[-]}} image to create a {{|App|}}Bitwarden{{[-]}} container."
website = "https://bitwarden.com/"

["bitwarden<__instance>:ADMIN_TOKEN"]
helpline = "Secret token to access the /admin panel. Leave blank to disable the admin panel."

["bitwarden<__instance>:DATABASE_URL"]
helpline = "SQLite path or MySQL/PostgreSQL connection URL."

[["bitwarden<__instance>:DATABASE_URL".options]]
value = "'data/db.sqlite3'"
label = "SQLite (default)"
help = "Simple file-based database, suitable for most installs."

["bitwarden<__instance>:DISABLE_ADMIN_TOKEN"]
helpline = "Disable admin token requirement (allow unauthenticated admin access — dangerous!)."

[["bitwarden<__instance>:DISABLE_ADMIN_TOKEN".options]]
value = "'false'"
label = "Disabled (safe)"
help = "Require the admin token to access /admin."

[["bitwarden<__instance>:DISABLE_ADMIN_TOKEN".options]]
value = "'true'"
label = "Enabled (dangerous)"
help = "Allow anyone to access /admin without a token."

["bitwarden<__instance>:DOMAIN"]
helpline = "Full URL where Vaultwarden is accessible (e.g. https://vault.example.com)."

["bitwarden<__instance>:ENABLE_DB_WAL"]
helpline = "Enable SQLite WAL mode for better write performance."

[["bitwarden<__instance>:ENABLE_DB_WAL".options]]
value = "'true'"
label = "Enabled"
help = "Recommended for most installs."

[["bitwarden<__instance>:ENABLE_DB_WAL".options]]
value = "'false'"
label = "Disabled"
help = "Disable if using a networked filesystem."

["bitwarden<__instance>:INVITATIONS_ALLOWED"]
helpline = "Allow existing users to invite new users."

[["bitwarden<__instance>:INVITATIONS_ALLOWED".options]]
value = "'false'"
label = "Disabled"

[["bitwarden<__instance>:INVITATIONS_ALLOWED".options]]
value = "'true'"
label = "Enabled"

["bitwarden<__instance>:SHOW_PASSWORD_HINT"]
helpline = "Show password hints on the login page."

[["bitwarden<__instance>:SHOW_PASSWORD_HINT".options]]
value = "'false'"
label = "Hidden"

[["bitwarden<__instance>:SHOW_PASSWORD_HINT".options]]
value = "'true'"
label = "Shown"

["bitwarden<__instance>:SIGNUPS_ALLOWED"]
helpline = "Allow new users to register accounts."

[["bitwarden<__instance>:SIGNUPS_ALLOWED".options]]
value = "'false'"
label = "Disabled"
help = "Recommended after initial setup."

[["bitwarden<__instance>:SIGNUPS_ALLOWED".options]]
value = "'true'"
label = "Enabled"

["bitwarden<__instance>:SIGNUPS_VERIFY"]
helpline = "Require email verification for new accounts."

[["bitwarden<__instance>:SIGNUPS_VERIFY".options]]
value = "'false'"
label = "Not required"

[["bitwarden<__instance>:SIGNUPS_VERIFY".options]]
value = "'true'"
label = "Required"

["bitwarden<__instance>:WEBSOCKET_ENABLE"]
helpline = "Enable WebSocket notifications for real-time vault sync."

[["bitwarden<__instance>:WEBSOCKET_ENABLE".options]]
value = "'true'"
label = "Enabled"
help = "Recommended for live sync across clients."

[["bitwarden<__instance>:WEBSOCKET_ENABLE".options]]
value = "'false'"
label = "Disabled"
