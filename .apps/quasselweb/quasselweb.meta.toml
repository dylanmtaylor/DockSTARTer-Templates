[app]
description = "Web client for {{|App|}}Quassel{{[-]}}. A {{|App|}}Quassel-Core{{[-]}} instance is required"
helptext = "{{|App|}}Quassel-web{{[-]}} is a web client for {{|App|}}Quassel{{[-]}}. Note that a {{|App|}}Quassel{{[-]}}-core instance is required. A container for it can be found here."
website = "https://github.com/magne4000/quassel-webserver"

["quasselweb<__instance>:QUASSEL_CORE"]
helpline = "Hostname of the Quassel Core to connect to (e.g. quasselcore)."

["quasselweb<__instance>:QUASSEL_PORT"]
helpline = "Port the Quassel Core is listening on (default 4242)."

["quasselweb<__instance>:QUASSEL_HTTPS"]
helpline = "Enable HTTPS for the Quassel Web UI. Leave blank for HTTP."

[["quasselweb<__instance>:QUASSEL_HTTPS".options]]
value = "'true'"
label = "Enabled"

[["quasselweb<__instance>:QUASSEL_HTTPS".options]]
value = "'''"
label = "Disabled"
help = "Leave blank to use HTTP."

["quasselweb<__instance>:URL_BASE"]
helpline = "Base URL path for Quassel Web (e.g. /quassel for a subfolder install)."
