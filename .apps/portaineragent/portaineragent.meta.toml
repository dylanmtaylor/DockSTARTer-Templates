[app]
description = "An agent used to manage all the resources in a Swarm cluster"
helptext = "The {{|App|}}Portainer Agent{{[-]}} allows the Docker host to be managed by an instance of {{|App|}}Portainer{{[-]}} running on another machine."
website = "https://github.com/portainer/agent"

["portaineragent<__instance>:CAP_HOST_MANAGEMENT"]
helpline = "Allow Portainer Agent to manage host-level resources."

[["portaineragent<__instance>:CAP_HOST_MANAGEMENT".options]]
value = "'1'"
label = "Enabled"
help = "Required for full host management from Portainer."

[["portaineragent<__instance>:CAP_HOST_MANAGEMENT".options]]
value = "'0'"
label = "Disabled"
