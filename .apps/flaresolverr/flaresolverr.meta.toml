[app]
description = "{{|App|}}FlareSolverr{{[-]}} is a proxy server to bypass Cloudflare protection"
helptext = "{{|App|}}FlareSolverr{{[-]}} starts a proxy server and it waits for user requests in an idle state using few resources. When some request arrives, it uses puppeteer with the stealth plugin to create a headless browser (Chrome). It opens the URL with user parameters and waits until the Cloudflare challenge is solved (or timeout). The HTML code and the cookies are sent back to the user, and those cookies can be used to bypass Cloudflare using other HTTP clients."

["flaresolverr<__instance>:LOG_LEVEL"]
helpline = "Logging verbosity level."

[["flaresolverr<__instance>:LOG_LEVEL".options]]
value = "'error'"
label = "Error"

[["flaresolverr<__instance>:LOG_LEVEL".options]]
value = "'warn'"
label = "Warn"

[["flaresolverr<__instance>:LOG_LEVEL".options]]
value = "'info'"
label = "Info"
help = "Standard logging (recommended)."

[["flaresolverr<__instance>:LOG_LEVEL".options]]
value = "'debug'"
label = "Debug"
help = "Verbose output for troubleshooting."

["flaresolverr<__instance>:CAPTCHA_SOLVER"]
helpline = "External service to solve CAPTCHAs (requires API key for paid services)."

[["flaresolverr<__instance>:CAPTCHA_SOLVER".options]]
value = "'none'"
label = "None"
help = "No CAPTCHA solving (default)."

[["flaresolverr<__instance>:CAPTCHA_SOLVER".options]]
value = "'2captcha'"
label = "2Captcha"

[["flaresolverr<__instance>:CAPTCHA_SOLVER".options]]
value = "'deathbycaptcha'"
label = "DeathByCaptcha"

[["flaresolverr<__instance>:CAPTCHA_SOLVER".options]]
value = "'anticaptcha'"
label = "AntiCaptcha"

["flaresolverr<__instance>:LOG_HTML"]
helpline = "Log full HTML responses for debugging (very verbose)."
