[app]
description = "{{|App|}}SABnzbd{{[-]}} with {{|App|}}PrivoxyVPN{{[-]}}"
helptext = "{{|App|}}SABnzbd{{[-]}} is a Docker build script for Arch Linux base with {{|App|}}SABnzbd{{[-]}}, {{|App|}}Privoxy{{[-]}} and {{|App|}}OpenVPN{{[-]}} all included in one image. The support forum for {{|App|}}SABnzbdVPN{{[-]}} is located here."
website = "http://sabnzbd.org/"

["sabnzbdvpn<__instance>:VPN_ENABLED"]
helpline = "Enable VPN for this container."

[["sabnzbdvpn<__instance>:VPN_ENABLED".options]]
value = "'yes'"
label = "Enabled"

[["sabnzbdvpn<__instance>:VPN_ENABLED".options]]
value = "'no'"
label = "Disabled"
help = "Run without VPN (not recommended for public trackers)."

["sabnzbdvpn<__instance>:VPN_CLIENT"]
helpline = "VPN client to use."

[["sabnzbdvpn<__instance>:VPN_CLIENT".options]]
value = "'openvpn'"
label = "OpenVPN"

[["sabnzbdvpn<__instance>:VPN_CLIENT".options]]
value = "'wireguard'"
label = "WireGuard"

["sabnzbdvpn<__instance>:VPN_PROV"]
helpline = "VPN provider. Use 'custom' with your own config file."

[["sabnzbdvpn<__instance>:VPN_PROV".options]]
value = "'custom'"
label = "Custom"
help = "Use your own OpenVPN/WireGuard config file."

[["sabnzbdvpn<__instance>:VPN_PROV".options]]
value = "'pia'"
label = "Private Internet Access"

[["sabnzbdvpn<__instance>:VPN_PROV".options]]
value = "'mullvad'"
label = "Mullvad"

[["sabnzbdvpn<__instance>:VPN_PROV".options]]
value = "'protonvpn'"
label = "ProtonVPN"

["sabnzbdvpn<__instance>:VPN_USER"]
helpline = "VPN account username."

["sabnzbdvpn<__instance>:VPN_PASS"]
helpline = "VPN account password."

["sabnzbdvpn<__instance>:VPN_OPTIONS"]
helpline = "Additional OpenVPN command-line options (advanced)."

["sabnzbdvpn<__instance>:VPN_INPUT_PORTS"]
helpline = "Comma-separated list of inbound ports to allow through the VPN firewall."

["sabnzbdvpn<__instance>:VPN_OUTPUT_PORTS"]
helpline = "Comma-separated list of outbound ports to allow through the VPN firewall."

["sabnzbdvpn<__instance>:ENABLE_PRIVOXY"]
helpline = "Enable Privoxy HTTP proxy inside the container."

[["sabnzbdvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'no'"
label = "Disabled"

[["sabnzbdvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'yes'"
label = "Enabled"

["sabnzbdvpn<__instance>:LAN_NETWORK"]
helpline = "Your LAN subnet in CIDR notation (e.g. 192.168.1.0/24). Required for local access."

["sabnzbdvpn<__instance>:NAME_SERVERS"]
helpline = "Comma-separated DNS servers used inside the VPN tunnel."
