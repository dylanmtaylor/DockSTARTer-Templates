["doplarr<__instance>:LOG_LEVEL"]
helpline = "Logging verbosity level."

[["doplarr<__instance>:LOG_LEVEL".options]]
value = "':info'"
label = "Info"
help = "Standard logging (recommended)."

[["doplarr<__instance>:LOG_LEVEL".options]]
value = "':debug'"
label = "Debug"
help = "Verbose output for troubleshooting."

[["doplarr<__instance>:LOG_LEVEL".options]]
value = "':warn'"
label = "Warn"

[["doplarr<__instance>:LOG_LEVEL".options]]
value = "':error'"
label = "Error"

["doplarr<__instance>:DISCORD__TOKEN"]
helpline = "Discord bot token from the Discord Developer Portal."

