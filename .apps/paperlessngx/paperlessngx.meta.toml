[app]
description = "Community-supported open-source document management system"

["paperlessngx<__instance>:PAPERLESS_DBHOST"]
helpline = "PostgreSQL hostname (set automatically to the companion postgres container)."

["paperlessngx<__instance>:PAPERLESS_DBUSER"]
helpline = "PostgreSQL username for Paperless-ngx."

["paperlessngx<__instance>:PAPERLESS_DBPASS"]
helpline = "PostgreSQL password for Paperless-ngx."

["paperlessngx<__instance>:PAPERLESS_REDIS"]
helpline = "Redis connection URL (set automatically to the companion redis container)."
