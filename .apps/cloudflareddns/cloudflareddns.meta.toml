["cloudflareddns<__instance>:CF_APITOKEN"]
helpline = "Cloudflare API token with Zone:DNS:Edit permission (recommended over API key)."

["cloudflareddns<__instance>:CF_APIKEY"]
helpline = "Cloudflare Global API key (legacy — use CF_APITOKEN instead)."

["cloudflareddns<__instance>:CF_USER"]
helpline = "Cloudflare account email address (required with CF_APIKEY)."

["cloudflareddns<__instance>:CF_HOSTS"]
helpline = "Semicolon-separated list of hostnames to update (e.g. host1.example.com;host2.example.com)."

["cloudflareddns<__instance>:CF_ZONES"]
helpline = "Semicolon-separated list of zone names matching CF_HOSTS (e.g. example.com;example.com)."

["cloudflareddns<__instance>:CF_RECORDTYPES"]
helpline = "Semicolon-separated record types to update for each host."

[["cloudflareddns<__instance>:CF_RECORDTYPES".options]]
value = "'A'"
label = "A (IPv4)"
help = "Update IPv4 address records."

[["cloudflareddns<__instance>:CF_RECORDTYPES".options]]
value = "'AAAA'"
label = "AAAA (IPv6)"
help = "Update IPv6 address records."

[["cloudflareddns<__instance>:CF_RECORDTYPES".options]]
value = "'A;AAAA'"
label = "A + AAAA"
help = "Update both IPv4 and IPv6 records."

["cloudflareddns<__instance>:DETECTION_MODE"]
helpline = "Method used to detect your public IP address."

[["cloudflareddns<__instance>:DETECTION_MODE".options]]
value = "'dig-google.com'"
label = "dig (Google)"
help = "Use dig against Google DNS (default)."

[["cloudflareddns<__instance>:DETECTION_MODE".options]]
value = "'dig-opendns.com'"
label = "dig (OpenDNS)"

[["cloudflareddns<__instance>:DETECTION_MODE".options]]
value = "'curl-icanhazip.com'"
label = "curl icanhazip"

[["cloudflareddns<__instance>:DETECTION_MODE".options]]
value = "'curl-ifconfig.me'"
label = "curl ifconfig.me"

["cloudflareddns<__instance>:INTERVAL"]
helpline = "Check interval in seconds (default 300 = every 5 minutes)."
