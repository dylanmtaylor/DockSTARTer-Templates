["seerr<__instance>:VPN_ENABLED"]
helpline = "Enable VPN for this container."

[["seerr<__instance>:VPN_ENABLED".options]]
value = "'false'"
label = "Disabled"

[["seerr<__instance>:VPN_ENABLED".options]]
value = "'true'"
label = "Enabled"

["seerr<__instance>:VPN_CONF"]
helpline = "WireGuard config file name (without .conf) inside the wireguard config directory."

[["seerr<__instance>:VPN_CONF".options]]
value = "'wg0'"
label = "wg0 (default)"

["seerr<__instance>:VPN_PROVIDER"]
helpline = "VPN provider for PIA-specific features. Use 'custom' for other providers."

[["seerr<__instance>:VPN_PROVIDER".options]]
value = "'custom'"
label = "Custom"
help = "Use your own WireGuard config file."

[["seerr<__instance>:VPN_PROVIDER".options]]
value = "'pia'"
label = "Private Internet Access"
help = "Enables automatic port forwarding with PIA."

["seerr<__instance>:VPN_LAN_NETWORK"]
helpline = "Your LAN subnet in CIDR notation. Required for local access through the VPN."

["seerr<__instance>:VPN_LAN_LEAK_ENABLED"]
helpline = "Allow LAN traffic to bypass the VPN tunnel."

[["seerr<__instance>:VPN_LAN_LEAK_ENABLED".options]]
value = "'false'"
label = "Blocked"
help = "LAN traffic routes through the VPN (safer)."

[["seerr<__instance>:VPN_LAN_LEAK_ENABLED".options]]
value = "'true'"
label = "Allowed"

["seerr<__instance>:VPN_AUTO_PORT_FORWARD"]
helpline = "Automatically request a forwarded port from the VPN provider (PIA only)."

[["seerr<__instance>:VPN_AUTO_PORT_FORWARD".options]]
value = "'true'"
label = "Enabled"

[["seerr<__instance>:VPN_AUTO_PORT_FORWARD".options]]
value = "'false'"
label = "Disabled"

["seerr<__instance>:VPN_HEALTHCHECK_ENABLED"]
helpline = "Periodically check VPN connectivity and restart if it drops."

[["seerr<__instance>:VPN_HEALTHCHECK_ENABLED".options]]
value = "'false'"
label = "Disabled"

[["seerr<__instance>:VPN_HEALTHCHECK_ENABLED".options]]
value = "'true'"
label = "Enabled"

["seerr<__instance>:PRIVOXY_ENABLED"]
helpline = "Enable Privoxy HTTP proxy inside the container."

[["seerr<__instance>:PRIVOXY_ENABLED".options]]
value = "'false'"
label = "Disabled"

[["seerr<__instance>:PRIVOXY_ENABLED".options]]
value = "'true'"
label = "Enabled"

["seerr<__instance>:UNBOUND_ENABLED"]
helpline = "Enable Unbound DNS resolver inside the container."

[["seerr<__instance>:UNBOUND_ENABLED".options]]
value = "'false'"
label = "Disabled"

[["seerr<__instance>:UNBOUND_ENABLED".options]]
value = "'true'"
label = "Enabled"
