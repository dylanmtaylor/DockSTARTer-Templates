services:
  seerr<__instance>:
    container_name: ${SEERR<__INSTANCE>__CONTAINER_NAME?}
    env_file: .env.app.seerr<__instance>
    environment:
      - PGID=${PGID?}
      - PUID=${PUID?}
      - TZ=${TZ?}
    restart: ${SEERR<__INSTANCE>__RESTART?}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUME_CONFIG?}/seerr<__instance>:/config
