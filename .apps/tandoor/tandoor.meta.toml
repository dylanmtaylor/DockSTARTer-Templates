[app]
description = "The recipe manager that allows you to manage your ever growing collection of digital recipes."
helptext = "{{|App|}}Tandoor{{[-]}} is a recipe manager and so much more. You can import recipes from thousands of websites, generate mealplans, manage your shopping list. Share and collaborate with your friends and family using a mobile friendly web interface."
website = "https://docs.tandoor.dev/"

["tandoor<__instance>:SECRET_KEY"]
helpline = "Random secret key for Django session security. Change from the default!"

["tandoor<__instance>:DATABASE_URL"]
helpline = "Database connection URL."

[["tandoor<__instance>:DATABASE_URL".options]]
value = "'sqlite://localhost/data/db.sqlite3'"
label = "SQLite"
help = "Simple file-based database (recommended for single-server)."

["tandoor<__instance>:ALLOWED_HOSTS"]
helpline = "Comma-separated hostnames allowed to serve Tandoor. Use * to allow all."

[["tandoor<__instance>:ALLOWED_HOSTS".options]]
value = "'*'"
label = "All hosts"
help = "Allow any hostname (suitable behind a reverse proxy)."

["tandoor<__instance>:DEBUG"]
helpline = "Enable Django debug mode (logs verbose errors — disable in production)."

[["tandoor<__instance>:DEBUG".options]]
value = "'0'"
label = "Disabled"
help = "Production mode (recommended)."

[["tandoor<__instance>:DEBUG".options]]
value = "'1'"
label = "Enabled"
help = "Development/debug mode — do not expose publicly."

["tandoor<__instance>:GUNICORN_MEDIA"]
helpline = "Serve media files via Gunicorn (disable if using a reverse proxy to serve static files)."

[["tandoor<__instance>:GUNICORN_MEDIA".options]]
value = "'1'"
label = "Enabled"
help = "Serve media through Gunicorn (recommended for simple setups)."

[["tandoor<__instance>:GUNICORN_MEDIA".options]]
value = "'0'"
label = "Disabled"
help = "Serve media via external web server/reverse proxy."
