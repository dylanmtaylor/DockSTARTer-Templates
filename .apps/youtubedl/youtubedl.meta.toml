[app]
description = "Simple Web and REST interface for downloading {{|App|}}YouTube{{[-]}} videos onto a server."
helptext = "{{|App|}}youtube-dl-server{{[-]}} is very spartan Web and REST interface for downloading youtube videos onto a server. `bottle` + `{{|App|}}youtube-dl{{[-]}}`."
website = "https://github.com/nbr23/youtube-dl-server"

["youtubedl<__instance>:YDL_DEBUG"]
helpline = "Enable verbose debug logging."

[["youtubedl<__instance>:YDL_DEBUG".options]]
value = "'false'"
label = "Disabled"

[["youtubedl<__instance>:YDL_DEBUG".options]]
value = "'true'"
label = "Enabled"

["youtubedl<__instance>:YDL_CONFIG_PATH"]
helpline = "Path to the yt-dlp/youtube-dl config file inside the container."
