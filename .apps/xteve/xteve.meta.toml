[app]
description = "{{|App|}}xTeVe{{[-]}} is a M3U proxy server for {{|App|}}Plex{{[-]}}, {{|App|}}Emby{{[-]}} and any client and provider which supports the .TS and .M3U8 (HLS) streaming formats."
helptext = "{{|App|}}xTeVe{{[-]}} is a M3U proxy server for Plex, Emby and any client and provider which supports the .TS and .M3U8 (HLS) streaming formats. {{|App|}}xTeVe{{[-]}} emulates a SiliconDust HDHomeRun OTA tuner, which allows it to expose IPTV style channels to software, which would not normally support it."
website = "https://xteve.de/"

["xteve<__instance>:XTEVE_BRANCH"]
helpline = "xTeVe release branch to run."

[["xteve<__instance>:XTEVE_BRANCH".options]]
value = "'master'"
label = "Stable"
help = "Latest stable release (recommended)."

[["xteve<__instance>:XTEVE_BRANCH".options]]
value = "'beta'"
label = "Beta"
help = "Beta builds — may contain bugs."

[["xteve<__instance>:XTEVE_BRANCH".options]]
value = "'unstable'"
label = "Unstable"
help = "Development builds — likely unstable."

["xteve<__instance>:XTEVE_DEBUG"]
helpline = "Enable verbose debug logging."

[["xteve<__instance>:XTEVE_DEBUG".options]]
value = "'0'"
label = "Disabled"

[["xteve<__instance>:XTEVE_DEBUG".options]]
value = "'1'"
label = "Enabled"
