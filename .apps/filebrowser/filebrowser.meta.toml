["filebrowser<__instance>:FB_BASEURL"]
helpline = "Base URL path for File Browser (e.g. /files for a subfolder install)."

["filebrowser<__instance>:FB_DATABASE"]
helpline = "Path to the File Browser database file."

["filebrowser<__instance>:FB_LOG"]
helpline = "Path to the File Browser log file. Use 'stdout' to log to container output."

[["filebrowser<__instance>:FB_LOG".options]]
value = "'/config/filebrowser.log'"
label = "Log file"

[["filebrowser<__instance>:FB_LOG".options]]
value = "'stdout'"
label = "stdout"
help = "Write logs to container output (visible in docker logs)."
