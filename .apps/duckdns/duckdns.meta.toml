[app]
description = "Free service which will point a DNS to an IP of your choice"
helptext = "{{|App|}}DuckDNS{{[-]}} is a free service which will point a DNS (sub domains of duckdns.org) to an IP of your choice. The service is completely free, and doesn't require reactivation or forum posts to maintain its existence."
website = "https://www.duckdns.org/"

["duckdns<__instance>:SUBDOMAINS"]
helpline = "Comma-separated list of DuckDNS subdomains to update (without .duckdns.org)."

["duckdns<__instance>:TOKEN"]
helpline = "Your DuckDNS account token from duckdns.org."

["duckdns<__instance>:LOG_FILE"]
helpline = "Write update results to a log file inside the container."

[["duckdns<__instance>:LOG_FILE".options]]
value = "'true'"
label = "Enabled"

[["duckdns<__instance>:LOG_FILE".options]]
value = "'false'"
label = "Disabled"
