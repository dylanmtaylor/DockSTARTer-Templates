[app]
description = "Automatically update running Docker containers"
helptext = "{{|App|}}Watchtower{{[-]}} can update the running version of your containerized app simply by pushing a new image to the Docker Hub or your own image registry. {{|App|}}Watchtower{{[-]}} will pull down your new image, gracefully shut down your existing container and restart it with the same options that were used when it was deployed initially."
website = "https://watchtower.nickfedor.com"

["watchtower<__instance>:WATCHTOWER_CLEANUP"]
helpline = "Remove old images after updating containers."

[["watchtower<__instance>:WATCHTOWER_CLEANUP".options]]
value = "'true'"
label = "Enabled"
help = "Recommended to avoid accumulating unused images."

[["watchtower<__instance>:WATCHTOWER_CLEANUP".options]]
value = "'false'"
label = "Disabled"

["watchtower<__instance>:WATCHTOWER_INCLUDE_STOPPED"]
helpline = "Also check stopped containers for updates."

[["watchtower<__instance>:WATCHTOWER_INCLUDE_STOPPED".options]]
value = "'false'"
label = "Disabled"

[["watchtower<__instance>:WATCHTOWER_INCLUDE_STOPPED".options]]
value = "'true'"
label = "Enabled"

["watchtower<__instance>:WATCHTOWER_MONITOR_ONLY"]
helpline = "Check for updates but do not apply them (notification-only mode)."

[["watchtower<__instance>:WATCHTOWER_MONITOR_ONLY".options]]
value = "'false'"
label = "Disabled"
help = "Apply updates automatically."

[["watchtower<__instance>:WATCHTOWER_MONITOR_ONLY".options]]
value = "'true'"
label = "Monitor only"
help = "Report available updates without applying them."

["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS"]
helpline = "Notification method for update events."

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS".options]]
value = "'shoutrrr'"
label = "Shoutrrr"
help = "Generic notification router — set WATCHTOWER_NOTIFICATION_URL for the target service."

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS".options]]
value = "'slack'"
label = "Slack"

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS".options]]
value = "'msteams'"
label = "MS Teams"

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS".options]]
value = "'email'"
label = "Email"

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS".options]]
value = "'gotify'"
label = "Gotify"

["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS_LEVEL"]
helpline = "Minimum log level to trigger a notification."

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS_LEVEL".options]]
value = "'info'"
label = "Info"
help = "Notify on all updates and events (recommended)."

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS_LEVEL".options]]
value = "'warn'"
label = "Warn"

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS_LEVEL".options]]
value = "'error'"
label = "Error"
help = "Only notify on failures."

[["watchtower<__instance>:WATCHTOWER_NOTIFICATIONS_LEVEL".options]]
value = "'debug'"
label = "Debug"
help = "Verbose — includes all internal events."

["watchtower<__instance>:WATCHTOWER_NOTIFICATION_URL"]
helpline = "Shoutrrr-format URL for the notification target (e.g. discord://token@channel)."

["watchtower<__instance>:WATCHTOWER_SCHEDULE"]
helpline = "Cron expression for update checks (e.g. '0 0 4 * * *' = daily at 4am)."

["watchtower<__instance>:WATCHTOWER_TIMEOUT"]
helpline = "How long to wait for a container to stop before killing it (e.g. 10s, 30s)."
