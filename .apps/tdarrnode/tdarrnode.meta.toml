[app]
description = "{{|App|}}Tdarr Node{{[-]}} is a self hosted module used for encoding in conjunction with {{|App|}}Tdarr{{[-]}}"
helptext = "{{|App|}}Tdarr Node{{[-]}} is a companion module to {{|App|}}Tdarr{{[-]}}. Nodes are a cross-platform module which work together with {{|App|}}Tdarr{{[-]}} to process your files. Can be run on same machine as {{|App|}}Tdarr{{[-]}} or remotely."
website = "https://dockstarter.com/apps/tdarr"

["tdarrnode<__instance>:serverIP"]
helpline = "Hostname or IP of the Tdarr server this node connects to."

["tdarrnode<__instance>:serverPort"]
helpline = "Port the Tdarr server is listening on (default 8266)."

["tdarrnode<__instance>:nodeIP"]
helpline = "Hostname or IP this node advertises to the server."

["tdarrnode<__instance>:nodeID"]
helpline = "Unique identifier for this Tdarr node."
