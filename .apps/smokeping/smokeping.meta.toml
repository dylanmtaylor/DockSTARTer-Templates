[app]
description = "Latency logging, graphing, and alerting system"
helptext = "{{|App|}}Smokeping{{[-]}} keeps track of your network latency."
website = "https://oss.oetiker.ch/smokeping/"

["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS1"]
helpline = "Primary DNS server used by SmokePing for latency probing."

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS1".options]]
value = "'1.1.1.1'"
label = "Cloudflare"

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS1".options]]
value = "'8.8.8.8'"
label = "Google"

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS1".options]]
value = "'9.9.9.9'"
label = "Quad9"

["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS2"]
helpline = "Secondary DNS server used by SmokePing for latency probing."

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS2".options]]
value = "'1.0.0.1'"
label = "Cloudflare"

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS2".options]]
value = "'8.8.4.4'"
label = "Google"

[["SMOKEPING<__INSTANCE>__ENVIRONMENT_DNS2".options]]
value = "'149.112.112.112'"
label = "Quad9"
