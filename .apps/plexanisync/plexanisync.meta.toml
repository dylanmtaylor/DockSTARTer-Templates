["plexanisync:PLEX_URL"]
helpline = "URL of your Plex server (e.g. http://plex:32400)."

["plexanisync:PLEX_TOKEN"]
helpline = "Plex authentication token. Find it in a Plex XML request URL as X-Plex-Token."

["plexanisync:PLEX_SECTION"]
helpline = "Name of the Plex library section containing your anime."

["plexanisync:ANI_USERNAME"]
helpline = "AniList username to sync watch history to."

["plexanisync:ANI_TOKEN"]
helpline = "AniList API token. Generate at anilist.co/settings/developer."

["plexanisync:INTERVAL"]
helpline = "Sync interval in seconds (default 3600 = every hour)."
