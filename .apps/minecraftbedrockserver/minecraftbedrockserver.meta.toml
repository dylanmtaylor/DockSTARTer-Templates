[app]
description = "{{|App|}}Minecraft Bedrock Server{{[-]}}"
helptext = "{{|App|}}Minecraft Bedrock Server{{[-]}} will automatically download the latest stable version at startup. {{|App|}}Bedrock Dedicated Server{{[-]}} is official server software to host your own server for {{|App|}}Minecraft{{[-]}} (Bedrock)."
website = "https://www.minecraft.net/en-us/download/server/bedrock"

["minecraftbedrockserver<__instance>:EULA"]
helpline = "Accept the Minecraft End User License Agreement. Must be TRUE to start the server."

[["minecraftbedrockserver<__instance>:EULA".options]]
value = "'TRUE'"
label = "Accepted"
help = "Required to run the server. See https://aka.ms/MinecraftEULA"

["minecraftbedrockserver<__instance>:VERSION"]
helpline = "Bedrock server version to run."

[["minecraftbedrockserver<__instance>:VERSION".options]]
value = "'LATEST'"
label = "Latest"
help = "Always run the latest available version."
