["librespeed<__instance>:DB_TYPE"]
helpline = "Database backend to store speed test results."

[["librespeed<__instance>:DB_TYPE".options]]
value = "'sqlite'"
label = "SQLite"
help = "Simple file-based database (recommended for single-server)."

[["librespeed<__instance>:DB_TYPE".options]]
value = "'mysql'"
label = "MySQL / MariaDB"

[["librespeed<__instance>:DB_TYPE".options]]
value = "'postgresql'"
label = "PostgreSQL"

["librespeed<__instance>:DB_HOSTNAME"]
helpline = "Database hostname (required when not using SQLite)."

["librespeed<__instance>:DB_NAME"]
helpline = "Database name."

["librespeed<__instance>:DB_USERNAME"]
helpline = "Database username."

["librespeed<__instance>:DB_PASSWORD"]
helpline = "Database password."

["librespeed<__instance>:PASSWORD"]
helpline = "Password to protect the admin statistics page."
