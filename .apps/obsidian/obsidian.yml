services:
  obsidian<__instance>:
    container_name: ${OBSIDIAN<__INSTANCE>__CONTAINER_NAME?}
    env_file: .env.app.obsidian<__instance>
    environment:
      - PGID=${PGID?}
      - PUID=${PUID?}
      - TZ=${TZ?}
    restart: ${OBSIDIAN<__INSTANCE>__RESTART?}
    shm_size: '1gb'
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUME_CONFIG?}/obsidian<__instance>:/config
