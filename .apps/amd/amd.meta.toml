["amd<__instance>:FORMAT"]
helpline = "Audio format for downloaded tracks."

[["amd<__instance>:FORMAT".options]]
value = "'FLAC'"
label = "FLAC"
help = "Lossless audio (largest files)."

[["amd<__instance>:FORMAT".options]]
value = "'MP3'"
label = "MP3"
help = "Lossy — widest compatibility."

[["amd<__instance>:FORMAT".options]]
value = "'OPUS'"
label = "Opus"
help = "Lossy — best quality at low bitrates."

[["amd<__instance>:FORMAT".options]]
value = "'AAC'"
label = "AAC"
help = "Lossy — good quality, Apple friendly."

[["amd<__instance>:FORMAT".options]]
value = "'ALAC'"
label = "ALAC"
help = "Lossless — Apple Lossless Audio Codec."

[["amd<__instance>:FORMAT".options]]
value = "'FLAC:MP3'"
label = "FLAC then MP3"
help = "Try FLAC first, fall back to MP3."

["amd<__instance>:BITRATE"]
helpline = "Bitrate for lossy formats (kbps)."

[["amd<__instance>:BITRATE".options]]
value = "'320'"
label = "320 kbps"
help = "Highest quality lossy (recommended)."

[["amd<__instance>:BITRATE".options]]
value = "'256'"
label = "256 kbps"

[["amd<__instance>:BITRATE".options]]
value = "'192'"
label = "192 kbps"

[["amd<__instance>:BITRATE".options]]
value = "'128'"
label = "128 kbps"

["amd<__instance>:DOWNLOADMODE"]
helpline = "Which tracks to download."

[["amd<__instance>:DOWNLOADMODE".options]]
value = "'wanted'"
label = "Wanted"
help = "Download only tracks missing from Lidarr (recommended)."

[["amd<__instance>:DOWNLOADMODE".options]]
value = "'everything'"
label = "Everything"
help = "Download all tracks, including those already in Lidarr."

["amd<__instance>:LIST"]
helpline = "Which Lidarr lists to source artists from."

[["amd<__instance>:LIST".options]]
value = "'both'"
label = "Both"
help = "Use both artist and album lists (recommended)."

[["amd<__instance>:LIST".options]]
value = "'artist'"
label = "Artist"

[["amd<__instance>:LIST".options]]
value = "'album'"
label = "Album"

["amd<__instance>:SEARCHTYPE"]
helpline = "How strictly to match search results."

[["amd<__instance>:SEARCHTYPE".options]]
value = "'both'"
label = "Both"
help = "Try fuzzy first, then strict (recommended)."

[["amd<__instance>:SEARCHTYPE".options]]
value = "'fuzzy'"
label = "Fuzzy"
help = "Broader matching — may include false positives."

[["amd<__instance>:SEARCHTYPE".options]]
value = "'strict'"
label = "Strict"
help = "Exact matching only."

["amd<__instance>:AUTOSTART"]
helpline = "Automatically start downloading on container start."

[["amd<__instance>:AUTOSTART".options]]
value = "'true'"
label = "Enabled"

[["amd<__instance>:AUTOSTART".options]]
value = "'false'"
label = "Disabled"

["amd<__instance>:REPLAYGAIN"]
helpline = "Embed ReplayGain tags in downloaded files."

[["amd<__instance>:REPLAYGAIN".options]]
value = "'true'"
label = "Enabled"

[["amd<__instance>:REPLAYGAIN".options]]
value = "'false'"
label = "Disabled"

["amd<__instance>:REQUIREQUALITY"]
helpline = "Skip downloads that do not meet the requested format/bitrate."

[["amd<__instance>:REQUIREQUALITY".options]]
value = "'false'"
label = "Accept any quality"

[["amd<__instance>:REQUIREQUALITY".options]]
value = "'true'"
label = "Require exact quality"

["amd<__instance>:LIDARRURL"]
helpline = "URL of the Lidarr instance (e.g. http://lidarr:8686)."

["amd<__instance>:LIDARRAPIKEY"]
helpline = "Lidarr API key from Settings → General."

["amd<__instance>:ARL_TOKEN"]
helpline = "Deezer ARL token for authentication. Obtain from your Deezer browser cookies."

["amd<__instance>:SCRIPTINTERVAL"]
helpline = "How often to check for new wanted tracks (e.g. 1h, 30m, 6h)."

["amd<__instance>:CONCURRENCY"]
helpline = "Number of simultaneous downloads."

["amd<__instance>:MBRAINZMIRROR"]
helpline = "MusicBrainz mirror URL for metadata lookups."

["amd<__instance>:MBRATELIMIT"]
helpline = "Requests per second to MusicBrainz (1 = default, respect rate limits)."
