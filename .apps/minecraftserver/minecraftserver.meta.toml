[app]
description = "{{|App|}}Minecraft Java Edition Server{{[-]}}"
helptext = "{{|App|}}Minecraft Server{{[-]}} will automatically download the latest stable version at startup. You can also run/upgrade to any specific version or the latest snapshot."
website = "https://www.minecraft.net/en-us/download/server"

["minecraftserver<__instance>:EULA"]
helpline = "Accept the Minecraft End User License Agreement. Must be TRUE to start the server."

[["minecraftserver<__instance>:EULA".options]]
value = "'TRUE'"
label = "Accepted"
help = "Required to run the server. See https://aka.ms/MinecraftEULA"

["minecraftserver<__instance>:VERSION"]
helpline = "Minecraft server version to run."

[["minecraftserver<__instance>:VERSION".options]]
value = "'LATEST'"
label = "Latest"
help = "Always run the latest available version."

["minecraftserver<__instance>:TYPE"]
helpline = "Server software type."

[["minecraftserver<__instance>:TYPE".options]]
value = "'VANILLA'"
label = "Vanilla"
help = "Official Mojang server (recommended for compatibility)."

[["minecraftserver<__instance>:TYPE".options]]
value = "'PAPER'"
label = "Paper"
help = "High-performance fork with plugin support."

[["minecraftserver<__instance>:TYPE".options]]
value = "'FABRIC'"
label = "Fabric"
help = "Lightweight mod loader."

[["minecraftserver<__instance>:TYPE".options]]
value = "'FORGE'"
label = "Forge"
help = "Full mod support via Forge."

[["minecraftserver<__instance>:TYPE".options]]
value = "'SPIGOT'"
label = "Spigot"
help = "Plugin-capable fork of CraftBukkit."
