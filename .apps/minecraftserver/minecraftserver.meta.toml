["minecraftserver:EULA"]
helpline = "Accept the Minecraft End User License Agreement. Must be TRUE to start the server."

[["minecraftserver:EULA".options]]
value = "'TRUE'"
label = "Accepted"
help = "Required to run the server. See https://aka.ms/MinecraftEULA"

["minecraftserver:VERSION"]
helpline = "Minecraft server version to run."

[["minecraftserver:VERSION".options]]
value = "'LATEST'"
label = "Latest"
help = "Always run the latest available version."

["minecraftserver:TYPE"]
helpline = "Server software type."

[["minecraftserver:TYPE".options]]
value = "'VANILLA'"
label = "Vanilla"
help = "Official Mojang server (recommended for compatibility)."

[["minecraftserver:TYPE".options]]
value = "'PAPER'"
label = "Paper"
help = "High-performance fork with plugin support."

[["minecraftserver:TYPE".options]]
value = "'FABRIC'"
label = "Fabric"
help = "Lightweight mod loader."

[["minecraftserver:TYPE".options]]
value = "'FORGE'"
label = "Forge"
help = "Full mod support via Forge."

[["minecraftserver:TYPE".options]]
value = "'SPIGOT'"
label = "Spigot"
help = "Plugin-capable fork of CraftBukkit."
