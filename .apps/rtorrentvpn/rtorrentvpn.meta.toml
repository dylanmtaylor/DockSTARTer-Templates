["rtorrentvpn<__instance>:VPN_ENABLED"]
helpline = "Enable VPN for this container."

[["rtorrentvpn<__instance>:VPN_ENABLED".options]]
value = "'true'"
label = "Enabled"

[["rtorrentvpn<__instance>:VPN_ENABLED".options]]
value = "'false'"
label = "Disabled"
help = "Run without VPN (not recommended for public trackers)."

["rtorrentvpn<__instance>:VPN_CLIENT"]
helpline = "VPN client to use."

[["rtorrentvpn<__instance>:VPN_CLIENT".options]]
value = "'openvpn'"
label = "OpenVPN"

[["rtorrentvpn<__instance>:VPN_CLIENT".options]]
value = "'wireguard'"
label = "WireGuard"

["rtorrentvpn<__instance>:VPN_PROV"]
helpline = "VPN provider. Use 'custom' with your own config file."

[["rtorrentvpn<__instance>:VPN_PROV".options]]
value = "'custom'"
label = "Custom"
help = "Use your own OpenVPN/WireGuard config file."

[["rtorrentvpn<__instance>:VPN_PROV".options]]
value = "'pia'"
label = "Private Internet Access"

[["rtorrentvpn<__instance>:VPN_PROV".options]]
value = "'mullvad'"
label = "Mullvad"

[["rtorrentvpn<__instance>:VPN_PROV".options]]
value = "'protonvpn'"
label = "ProtonVPN"

["rtorrentvpn<__instance>:VPN_USER"]
helpline = "VPN account username."

["rtorrentvpn<__instance>:VPN_PASS"]
helpline = "VPN account password."

["rtorrentvpn<__instance>:VPN_OPTIONS"]
helpline = "Additional OpenVPN command-line options (advanced)."

["rtorrentvpn<__instance>:ENABLE_PRIVOXY"]
helpline = "Enable Privoxy HTTP proxy inside the container."

[["rtorrentvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'no'"
label = "Disabled"

[["rtorrentvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'yes'"
label = "Enabled"

["rtorrentvpn<__instance>:ENABLE_AUTODL_IRSSI"]
helpline = "Enable autodl-irssi for automatic torrent downloading from IRC."

[["rtorrentvpn<__instance>:ENABLE_AUTODL_IRSSI".options]]
value = "'no'"
label = "Disabled"

[["rtorrentvpn<__instance>:ENABLE_AUTODL_IRSSI".options]]
value = "'yes'"
label = "Enabled"

["rtorrentvpn<__instance>:ENABLE_RPC2"]
helpline = "Enable the RPC2 interface (required for ruTorrent)."

[["rtorrentvpn<__instance>:ENABLE_RPC2".options]]
value = "'yes'"
label = "Enabled"

[["rtorrentvpn<__instance>:ENABLE_RPC2".options]]
value = "'no'"
label = "Disabled"

["rtorrentvpn<__instance>:ENABLE_RPC2_AUTH"]
helpline = "Require authentication for the RPC2 interface."

[["rtorrentvpn<__instance>:ENABLE_RPC2_AUTH".options]]
value = "'yes'"
label = "Enabled"

[["rtorrentvpn<__instance>:ENABLE_RPC2_AUTH".options]]
value = "'no'"
label = "Disabled"

["rtorrentvpn<__instance>:ENABLE_WEBUI_AUTH"]
helpline = "Require authentication for the ruTorrent web UI."

[["rtorrentvpn<__instance>:ENABLE_WEBUI_AUTH".options]]
value = "'yes'"
label = "Enabled"

[["rtorrentvpn<__instance>:ENABLE_WEBUI_AUTH".options]]
value = "'no'"
label = "Disabled"

["rtorrentvpn<__instance>:RPC2_USER"]
helpline = "Username for RPC2 interface authentication."

["rtorrentvpn<__instance>:RPC2_PASS"]
helpline = "Password for RPC2 interface authentication."

["rtorrentvpn<__instance>:WEBUI_USER"]
helpline = "Username for the ruTorrent web UI."

["rtorrentvpn<__instance>:WEBUI_PASS"]
helpline = "Password for the ruTorrent web UI."

["rtorrentvpn<__instance>:NAME_SERVERS"]
helpline = "Comma-separated DNS servers used inside the VPN tunnel."
