[app]
description = "{{|App|}}Dozzle{{[-]}} is a simple, lightweight application that provides you with a web based interface to monitor your Docker container logs live."
helptext = "{{|App|}}Dozzle{{[-]}} is a simple, lightweight application that provides you with a web based interface to monitor your Docker container logs live. It doesn’t store log information, it is for live monitoring of your container logs only."
website = "https://dozzle.dev/"

["dozzle<__instance>:DOZZLE_LEVEL"]
helpline = "Minimum log level to display in the Dozzle UI."

[["dozzle<__instance>:DOZZLE_LEVEL".options]]
value = "'info'"
label = "Info"
help = "Show info, warnings, and errors (recommended)."

[["dozzle<__instance>:DOZZLE_LEVEL".options]]
value = "'debug'"
label = "Debug"
help = "Show all log messages including debug output."

[["dozzle<__instance>:DOZZLE_LEVEL".options]]
value = "'warn'"
label = "Warn"
help = "Show only warnings and errors."

[["dozzle<__instance>:DOZZLE_LEVEL".options]]
value = "'error'"
label = "Error"
help = "Show only errors."

[["dozzle<__instance>:DOZZLE_LEVEL".options]]
value = "'trace'"
label = "Trace"
help = "Most verbose — includes internal Dozzle events."

["dozzle<__instance>:DOZZLE_BASE"]
helpline = "Base URL path for Dozzle (e.g. /dozzle for a subfolder install)."

["dozzle<__instance>:DOZZLE_FILTER"]
helpline = "Filter which containers are shown (e.g. name=myapp or status=running)."
