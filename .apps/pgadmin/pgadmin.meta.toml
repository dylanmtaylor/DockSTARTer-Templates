[app]
description = "{{|App|}}pgAdmin 4{{[-]}} is a web based administration tool for the PostgreSQL database."
helptext = "{{|App|}}pgAdmin{{[-]}}: {{|App|}}pgAdmin{{[-]}} is the most popular and feature rich Open Source administration and development platform for {{|App|}}PostgreSQL{{[-]}}, the most advanced Open Source database in the world."
website = "https://www.pgadmin.org/"

["pgadmin<__instance>:PGADMIN_DEFAULT_EMAIL"]
helpline = "Admin account email address for the pgAdmin login."

["pgadmin<__instance>:PGADMIN_DEFAULT_PASSWORD"]
helpline = "Admin account password for the pgAdmin login."

["pgadmin<__instance>:PGADMIN_DISABLE_POSTFIX"]
helpline = "Disable the built-in Postfix mail server (recommended unless you need email alerts)."

[["pgadmin<__instance>:PGADMIN_DISABLE_POSTFIX".options]]
value = "'True'"
label = "Disabled"
help = "Skip starting Postfix (recommended for most installs)."

[["pgadmin<__instance>:PGADMIN_DISABLE_POSTFIX".options]]
value = "'False'"
label = "Enabled"
help = "Start Postfix for email alert delivery."
