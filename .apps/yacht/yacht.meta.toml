[app]
description = "{{|App|}}Yacht{{[-]}} is a container management UI with a focus on templates and 1-click deployments."
helptext = "{{|App|}}Yacht{{[-]}} is a container management UI with a focus on templates and 1-click deployments."

["yacht<__instance>:ADMIN_EMAIL"]
helpline = "Admin account email address."

["yacht<__instance>:SECRET_KEY"]
helpline = "Secret key for session security. Change from the default!"

["yacht<__instance>:DISABLE_AUTH"]
helpline = "Disable authentication entirely (dangerous on a public network)."

[["yacht<__instance>:DISABLE_AUTH".options]]
value = "'false'"
label = "Enabled"
help = "Require login (recommended)."

[["yacht<__instance>:DISABLE_AUTH".options]]
value = "'true'"
label = "Disabled"
help = "No login required — only use on a trusted network."
