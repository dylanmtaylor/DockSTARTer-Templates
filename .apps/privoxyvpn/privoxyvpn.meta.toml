[app]
description = "{{|App|}}Privoxy{{[-]}}, microsocks, {{|App|}}OpenVPN{{[-]}}, {{|App|}}WireGuard{{[-]}}"
helptext = "{{|App|}}PrivoxyVPN{{[-]}} is an Arch Linux based Docker Image with {{|App|}}Privoxy{{[-]}}, MicroSocks, {{|App|}}OpenVPN{{[-]}} and {{|App|}}WireGuard{{[-]}}. The support forum for {{|App|}}PrivoxyVPN{{[-]}} is located here."
website = "http://privoxy.org/"

["privoxyvpn<__instance>:VPN_ENABLED"]
helpline = "Enable VPN for this container."

[["privoxyvpn<__instance>:VPN_ENABLED".options]]
value = "'yes'"
label = "Enabled"

[["privoxyvpn<__instance>:VPN_ENABLED".options]]
value = "'no'"
label = "Disabled"

["privoxyvpn<__instance>:VPN_CLIENT"]
helpline = "VPN client to use."

[["privoxyvpn<__instance>:VPN_CLIENT".options]]
value = "'openvpn'"
label = "OpenVPN"

[["privoxyvpn<__instance>:VPN_CLIENT".options]]
value = "'wireguard'"
label = "WireGuard"

["privoxyvpn<__instance>:VPN_PROV"]
helpline = "VPN provider. Use 'custom' with your own config file."

[["privoxyvpn<__instance>:VPN_PROV".options]]
value = "'custom'"
label = "Custom"
help = "Use your own OpenVPN/WireGuard config file."

[["privoxyvpn<__instance>:VPN_PROV".options]]
value = "'pia'"
label = "Private Internet Access"

[["privoxyvpn<__instance>:VPN_PROV".options]]
value = "'mullvad'"
label = "Mullvad"

[["privoxyvpn<__instance>:VPN_PROV".options]]
value = "'protonvpn'"
label = "ProtonVPN"

["privoxyvpn<__instance>:VPN_USER"]
helpline = "VPN account username."

["privoxyvpn<__instance>:VPN_PASS"]
helpline = "VPN account password."

["privoxyvpn<__instance>:VPN_OPTIONS"]
helpline = "Additional OpenVPN command-line options (advanced)."

["privoxyvpn<__instance>:VPN_INPUT_PORTS"]
helpline = "Comma-separated list of inbound ports to allow through the VPN firewall."

["privoxyvpn<__instance>:VPN_OUTPUT_PORTS"]
helpline = "Comma-separated list of outbound ports to allow through the VPN firewall."

["privoxyvpn<__instance>:ENABLE_PRIVOXY"]
helpline = "Enable Privoxy HTTP proxy."

[["privoxyvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'no'"
label = "Disabled"

[["privoxyvpn<__instance>:ENABLE_PRIVOXY".options]]
value = "'yes'"
label = "Enabled"

["privoxyvpn<__instance>:ENABLE_SOCKS"]
helpline = "Enable SOCKS proxy inside the container."

[["privoxyvpn<__instance>:ENABLE_SOCKS".options]]
value = "'no'"
label = "Disabled"

[["privoxyvpn<__instance>:ENABLE_SOCKS".options]]
value = "'yes'"
label = "Enabled"

["privoxyvpn<__instance>:SOCKS_USER"]
helpline = "Username for SOCKS proxy authentication."

["privoxyvpn<__instance>:SOCKS_PASS"]
helpline = "Password for SOCKS proxy authentication."

["privoxyvpn<__instance>:LAN_NETWORK"]
helpline = "Your LAN subnet in CIDR notation (e.g. 192.168.1.0/24). Required for local access."

["privoxyvpn<__instance>:NAME_SERVERS"]
helpline = "Comma-separated DNS servers used inside the VPN tunnel."
